use_gpu: True
device: 0
early_stop:
  patience: 0
federate:
  mode: standalone
  client_num: 3
  total_round_num: 500
  save_to: "checkpoints/llama.dolly.adpt2.dp5.lr1.fedbiot.ckpt"
  save_freq: 100
  share_local_model: True
  online_aggr: False
data:
  root: data/
  type: 'databricks-dolly-15k.jsonl@llm'
  splits: [0.99, 0.0, 0.01]
  splitter: 'meta'
llm:
  grad_accum_step: 2
  tok_len: 650
  chat:
    max_len: 1000
  adapter:
    use: True
    args: [ { 'adapter_package': 'peft', 'adapter_method': 'lora', 'r': 8, 'lora_alpha': 16, 'lora_dropout': 0.05 } ]
  offsite_tuning:
    use: True
    save_full_model: True
    emu_l: 0
    emu_r: 30
    strategy: 'drop_layer'
    kwargs: [ { 'drop_ratio': 0.5 }]
    emu_align:
      use: True
      initial_only: False
      sim_loss: 'l2'
      layerwise_distill: False
      kl_divergence: 'raw'
      train:
        local_update_steps: 5
        initial_update_rounds: 100
        lm_loss_weight: 1.0
        kd_loss_weight: 0.0
dataloader:
  batch_size: 5
model:
  type: 'llama2'
train:
  local_update_steps: 30
  batch_or_epoch: batch
  optimizer:
    type: AdamW
    lr: 0.0001
    betas: (0.9, 0.95)
  is_enable_half: True
criterion:
  type: CrossEntropyLoss
trainer:
  type: llmtrainer
eval:
  freq: 100
  metrics: ['loss']
  best_res_update_round_wise_key: 'test_loss'
  report: ['weighted_avg', 'avg', 'raw']
  count_flops: False
expname: "fedbiot/llama-7b_dolly_offsite_adpt2_dp5"
